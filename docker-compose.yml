services:
  nginx:
    image: nginx:1.27-alpine
    container_name: finmaxxin-nginx
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  api:
    build:
      context: ./backend
    container_name: finmaxxin-api
    environment:
      FINMAXXIN_ENVIRONMENT: dev
      FINMAXXIN_REQUIRED_BEARER_TOKEN: finmaxxin-demo-token
      FINMAXXIN_MONTE_CARLO_PATHS: 600
      FINMAXXIN_MONTE_CARLO_SEED: 42
    depends_on:
      - postgres
      - redis
      - redpanda

  web:
    build:
      context: ./frontend
    container_name: finmaxxin-web
    environment:
      NEXT_PUBLIC_API_BASE: /api
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: finmaxxin-postgres
    environment:
      POSTGRES_USER: finmaxxin
      POSTGRES_PASSWORD: finmaxxin
      POSTGRES_DB: finmaxxin
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finmaxxin-redis
    command:
      - redis-server
      - --protected-mode
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-finmaxxin-redis-dev-pass}

  redpanda:
    image: redpandadata/redpanda:v24.2.11
    container_name: finmaxxin-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "127.0.0.1:9092:9092"

volumes:
  pgdata:
